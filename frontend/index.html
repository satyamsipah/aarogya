<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aarogya — Clinical Co-Pilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-700: #1a56db;
      --blue-100: #e1effe;
      --blue-50:  #ebf5fb;
      --gray-50:  #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-900: #0f172a;
      --green-100: #dcfce7; --green-800: #166534;
      --amber-50:  #fffbeb; --amber-700: #b45309; --amber-800: #92400e;
      --red-100:  #fee2e2; --red-800:  #991b1b;
      --sky-100:  #e0f2fe; --sky-800:  #075985;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--blue-700);
      color: #fff;
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: -.01em; }

    /* ── Safety banner ── */
    .banner {
      background: var(--amber-50);
      border-bottom: 1px solid #fde68a;
      padding: .4rem 1.25rem;
      font-size: .75rem;
      color: var(--amber-800);
      flex-shrink: 0;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: .9rem 1rem .6rem;
      border-bottom: 1px solid var(--gray-200);
    }
    .sidebar-head h2 {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--gray-400);
      font-weight: 600;
    }
    #patient-count {
      font-size: .75rem;
      color: var(--gray-400);
      margin-top: .2rem;
    }
    #patient-list {
      overflow-y: auto;
      flex: 1;
      padding: .5rem;
    }
    .pt-item {
      padding: .6rem .75rem;
      border-radius: .375rem;
      cursor: pointer;
      transition: background .12s;
      margin-bottom: .15rem;
      border-left: 3px solid transparent;
    }
    .pt-item:hover  { background: var(--blue-50); }
    .pt-item.active { background: var(--blue-100); border-left-color: var(--blue-700); }
    .pt-name { font-weight: 500; font-size: .85rem; }
    .pt-meta { font-size: .72rem; color: var(--gray-400); margin-top: .15rem; }

    /* ── Main panel ── */
    #main-panel {
      overflow-y: auto;
      padding: 1.25rem;
    }
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--gray-400);
      font-size: .95rem;
    }

    /* ── Patient header card ── */
    .pt-header {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: .5rem;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .pt-header h2 { font-size: 1.15rem; font-weight: 700; }
    .demographics {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-top: .75rem;
    }
    .demo-item .label { font-size: .68rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: .06em; }
    .demo-item .value { font-size: .875rem; font-weight: 500; margin-top: .15rem; }

    /* ── Sections ── */
    .section {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: .5rem;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .section-head {
      padding: .75rem 1.1rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: .5rem;
      background: var(--gray-50);
    }
    .section-head h3 {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--gray-600);
    }
    .count-chip {
      background: var(--gray-200);
      color: var(--gray-600);
      font-size: .68rem;
      font-weight: 700;
      padding: .1rem .45rem;
      border-radius: 9999px;
    }

    /* ── Tables ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead th {
      padding: .5rem .9rem;
      text-align: left;
      font-size: .72rem;
      font-weight: 600;
      color: var(--gray-600);
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    tbody td {
      padding: .55rem .9rem;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--gray-50); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 9999px;
      font-size: .68rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-active    { background: var(--green-100); color: var(--green-800); }
    .badge-completed { background: var(--sky-100);   color: var(--sky-800); }
    .badge-final     { background: var(--sky-100);   color: var(--sky-800); }
    .badge-stopped, .badge-cancelled { background: var(--red-100); color: var(--red-800); }
    .badge-default   { background: var(--gray-100);  color: var(--gray-600); }

    .empty { padding: 1.1rem; text-align: center; color: var(--gray-400); font-size: .82rem; }
  </style>
</head>
<body>

<header>
  <!-- ECG icon -->
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </svg>
  <h1>Aarogya — Clinical Co-Pilot</h1>
</header>

<div class="banner">
  ⚕&nbsp; <strong>Decision-support only.</strong> All output must be reviewed by a qualified human clinician. Not a diagnostic system.
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>Patients</h2>
      <div id="patient-count"></div>
    </div>
    <div id="patient-list"><div class="empty">Loading…</div></div>
  </aside>

  <main id="main-panel">
    <div class="placeholder">← Select a patient to view their record.</div>
  </main>
</div>

<script>
  // If the page is opened directly from the filesystem (file://) change this
  // to "http://localhost:8000" so fetch() can reach the API.
  const API_BASE = '';

  async function loadPatients() {
    const res = await fetch(`${API_BASE}/patients`);
    if (!res.ok) { showListError(); return; }
    const pts = await res.json();

    const countEl = document.getElementById('patient-count');
    countEl.textContent = `${pts.length} patient${pts.length !== 1 ? 's' : ''}`;

    const list = document.getElementById('patient-list');
    if (!pts.length) {
      list.innerHTML = '<div class="empty">No patients loaded. Run<br><code>python -m app.loader</code></div>';
      return;
    }
    list.innerHTML = pts.map(p => `
      <div class="pt-item" id="item-${p.fhir_id}" onclick="loadPatient('${p.fhir_id}')">
        <div class="pt-name">${esc(p.given_names ?? '')} ${esc(p.family_name ?? 'Unknown')}</div>
        <div class="pt-meta">${cap(p.gender ?? '')} &middot; ${p.birth_date ?? '—'}</div>
      </div>
    `).join('');
  }

  async function loadPatient(id) {
    document.querySelectorAll('.pt-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`item-${id}`);
    if (item) item.classList.add('active');

    const panel = document.getElementById('main-panel');
    panel.innerHTML = '<div class="placeholder">Loading…</div>';

    const res = await fetch(`${API_BASE}/patients/${id}`);
    if (!res.ok) { panel.innerHTML = '<div class="placeholder">Error loading patient.</div>'; return; }

    const { patient: p, observations, medications, reports } = await res.json();

    panel.innerHTML = `
      <div class="pt-header">
        <h2>${esc(p.given_names ?? '')} ${esc(p.family_name ?? 'Unknown')}</h2>
        <div class="demographics">
          <div class="demo-item">
            <div class="label">FHIR ID</div>
            <div class="value" style="font-family:monospace;font-size:.78rem">${esc(p.fhir_id)}</div>
          </div>
          <div class="demo-item">
            <div class="label">Gender</div>
            <div class="value">${cap(p.gender ?? '—')}</div>
          </div>
          <div class="demo-item">
            <div class="label">Date of Birth</div>
            <div class="value">${p.birth_date ?? '—'}</div>
          </div>
        </div>
      </div>

      ${section('Medications', medications.length, renderMeds(medications))}
      ${section('Lab / Vital Observations', observations.length, renderObs(observations))}
      ${section('Diagnostic Reports', reports.length, renderReports(reports))}
    `;
  }

  function section(title, count, body) {
    return `
      <div class="section">
        <div class="section-head">
          <h3>${title}</h3>
          <span class="count-chip">${count}</span>
        </div>
        ${body}
      </div>`;
  }

  function renderMeds(meds) {
    if (!meds.length) return '<div class="empty">No medications recorded.</div>';
    return `<div class="tbl-wrap"><table>
      <thead><tr><th>Medication</th><th>Status</th><th>Authored</th></tr></thead>
      <tbody>
        ${meds.map(m => `<tr>
          <td>${esc(m.medication_display ?? '—')}</td>
          <td>${badge(m.status)}</td>
          <td>${m.authored_on ?? '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  function renderObs(obs) {
    if (!obs.length) return '<div class="empty">No observations recorded.</div>';
    return `<div class="tbl-wrap"><table>
      <thead><tr><th>Test</th><th>Category</th><th>Result</th><th>Date</th></tr></thead>
      <tbody>
        ${obs.map(o => `<tr>
          <td>${esc(o.code_display ?? '—')}</td>
          <td>${esc(o.category ?? '—')}</td>
          <td>${o.value_quantity != null
                ? `${o.value_quantity} ${esc(o.value_unit ?? '')}`
                : esc(o.value_string ?? '—')}</td>
          <td>${(o.effective_dt ?? '').split('T')[0] || '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  function renderReports(reports) {
    if (!reports.length) return '<div class="empty">No diagnostic reports recorded.</div>';
    return `<div class="tbl-wrap"><table>
      <thead><tr><th>Report</th><th>Status</th><th>Date</th><th>Conclusion</th></tr></thead>
      <tbody>
        ${reports.map(r => `<tr>
          <td>${esc(r.code_display ?? '—')}</td>
          <td>${badge(r.status)}</td>
          <td>${(r.effective_dt ?? '').split('T')[0] || '—'}</td>
          <td>${esc(r.conclusion ?? '—')}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  function badge(status) {
    const s = status ?? '';
    const cls = ['active','completed','final','stopped','cancelled'].includes(s)
      ? `badge-${s}` : 'badge-default';
    return `<span class="badge ${cls}">${esc(s) || '—'}</span>`;
  }

  function cap(s)   { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
  function esc(s)   {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showListError() {
    document.getElementById('patient-list').innerHTML =
      '<div class="empty">Could not reach API.<br>Is the server running?</div>';
  }

  loadPatients();
</script>
</body>
</html>
