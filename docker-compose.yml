services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aarogya_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aarogya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-aarogya}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aarogya} -d ${POSTGRES_DB:-aarogya}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
